<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MediaMTX - Управление путями</title>
	<link rel="stylesheet" href="https://vjs.zencdn.net/8.12.0/video-js.css">
	<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 5px;
        }

        .controls {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls input {
            flex: 1;
            min-width: 200px;
            padding: 8px;
            border: 1px solid #ddd;
            font-size: 1em;
        }

        .controls button {
            padding: 8px 20px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }

        .controls button:hover {
            background: #555;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 30px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            margin-bottom: 15px;
            border-left: 3px solid #c62828;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            margin-bottom: 15px;
            border-left: 3px solid #2e7d32;
        }

        .paths-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 15px;
        }

        .path-card {
            background: white;
            border: 1px solid #ddd;
        }

        .path-header {
            background: #333;
            color: white;
            padding: 12px;
            font-size: 1.1em;
            font-weight: bold;
            word-break: break-all;
        }

        .path-info {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            font-size: 0.9em;
        }

        .path-info-row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }

        .path-info-label {
            font-weight: bold;
            color: #333;
        }

        .path-content {
            padding: 10px;
        }

        .records-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .record {
            background: #f9f9f9;
            padding: 8px;
            border-left: 2px solid #333;
            font-size: 0.9em;
        }

        .record-value {
            color: #555;
        }

        .no-records {
            text-align: center;
            color: #999;
            padding: 15px;
            font-style: italic;
        }

        .no-paths {
            text-align: center;
            color: #666;
            font-size: 1.1em;
            padding: 30px;
            background: white;
            border: 1px solid #ddd;
        }

        .recordings-section {
            background: #fafafa;
            padding: 10px;
            border-top: 1px solid #ddd;
            display: none;
        }

        .recordings-section.show {
            display: block;
        }

        .recordings-header {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .recording-item {
            background: white;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            font-size: 0.9em;
        }

        .segment-item {
            padding: 4px 8px;
            margin: 3px 0;
            background: #f0f0f0;
            border-left: 2px solid #666;
            font-size: 0.85em;
            transition: background 0.2s;
        }

        .segment-item:hover {
            background: #e0e0e0;
            border-left-color: #333;
        }

        details {
            cursor: pointer;
        }

        details summary {
            font-weight: bold;
            color: #333;
            padding: 5px;
            margin: -5px;
            border-radius: 3px;
        }

        details summary:hover {
            background: #e8e8e8;
        }

        /* Video.js стили */
        .video-js {
            font-family: Arial, sans-serif;
        }

        .vjs-default-skin .vjs-control-bar {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .vjs-default-skin .vjs-progress-control {
            height: 8px;
        }

        .vjs-default-skin .vjs-progress-holder {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .vjs-default-skin .vjs-play-progress {
            background-color: #ff0000;
        }

        .vjs-default-skin .vjs-load-progress {
            background-color: rgba(255, 255, 255, 0.5);
        }

	        .vjs-default-skin .vjs-time-tooltip {
	            background-color: rgba(0, 0, 0, 0.9);
	            color: white;
	            padding: 3px 6px;
	            border-radius: 3px;
	            font-size: 12px;
	        }

        @media (max-width: 768px) {
            .paths-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .controls input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Пути</h1>
        </div>

        <div class="controls">
            <input 
                type="text" 
                id="apiUrl" 
                placeholder="Введите URL API (например: http://localhost:9997)"
                value="http://localhost:9997"
            >
            <input 
                type="text" 
                id="playbackUrl" 
                placeholder="Введите URL Playback (например: http://localhost:9996)"
                value="http://localhost:9996"
            >
            <button onclick="loadPaths()">Загрузить пути</button>
        </div>

	        <div id="message"></div>
	        <div id="content"></div>
	    </div>

	    <script src="https://vjs.zencdn.net/8.12.0/video.min.js"></script>
	    <script>
	        // Загрузка путей с API
	        async function loadPaths() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const contentDiv = document.getElementById('content');
            const messageDiv = document.getElementById('message');

            if (!apiUrl) {
                showMessage('Пожалуйста, введите URL API', 'error');
                return;
            }

            // Очистка сообщения
            messageDiv.innerHTML = '';

            // Показываем загрузку
            contentDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Загрузка путей...</p></div>';

            try {
                // Получаем список путей
                const response = await fetch(`${apiUrl}/v3/paths/list`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                displayPaths(data, apiUrl);
            } catch (error) {
                showMessage(`Ошибка при загрузке: ${error.message}`, 'error');
                contentDiv.innerHTML = '';
                console.error('Error:', error);
            }
        }

        // Отображение путей
        function displayPaths(data, apiUrl) {
            const contentDiv = document.getElementById('content');

            // Проверяем, есть ли items в ответе
            const items = data.items || [];
            
            if (!items || items.length === 0) {
                contentDiv.innerHTML = '<div class="no-paths">Нет доступных путей</div>';
                return;
            }

            let html = '<div class="paths-grid">';

            for (let index = 0; index < items.length; index++) {
                const pathData = items[index];
                const pathName = pathData.name || 'Unknown';
                const source = pathData.source ? pathData.source.type : 'N/A';
                const ready = pathData.ready ? '✓ Готов' : '✗ Не готов';
                const bytesReceived = pathData.bytesReceived || 0;
                const bytesSent = pathData.bytesSent || 0;
                const readersCount = pathData.readers ? pathData.readers.length : 0;
                const recordingsId = `recordings-${index}`;
                const pathEncoded = encodeURIComponent(pathName);

                html += `
                    <div class="path-card">
                        <div class="path-header path-header-clickable" data-path-enc="${escapeHtml(pathEncoded)}" data-recordings-id="${recordingsId}" style="cursor: pointer;">
                            ${escapeHtml(pathName)}
                        </div>
                        <div class="path-info">
                            <div class="path-info-row">
                                <span class="path-info-label">Статус:</span>
                                <span>${escapeHtml(ready)}</span>
                            </div>
                            <div class="path-info-row">
                                <span class="path-info-label">Источник:</span>
                                <span>${escapeHtml(source)}</span>
                            </div>
                            <div class="path-info-row">
                                <span class="path-info-label">Читателей:</span>
                                <span>${readersCount}</span>
                            </div>
                            <div class="path-info-row">
                                <span class="path-info-label">Получено:</span>
                                <span>${formatBytes(bytesReceived)}</span>
                            </div>
                            <div class="path-info-row">
                                <span class="path-info-label">Отправлено:</span>
                                <span>${formatBytes(bytesSent)}</span>
                            </div>
                        </div>
                        <div class="path-content">
                            ${renderTracks(pathData.tracks)}
                        </div>
                        <div class="recordings-section" id="${recordingsId}"></div>
                    </div>
                `;
            }

            html += '</div>';
            contentDiv.innerHTML = html;

            // Подключаем обработчики клика по пути после рендера
            const headers = contentDiv.querySelectorAll('.path-header-clickable');
            for (const el of headers) {
                el.addEventListener('click', () => {
                    const recordingsId = el.getAttribute('data-recordings-id');
                    const recordingsSection = recordingsId ? document.getElementById(recordingsId) : null;
                    const pathEnc = el.getAttribute('data-path-enc') || '';
                    const pathName = safeDecodeURIComponent(pathEnc);
                    loadRecordings(pathName, recordingsSection);
                });
            }

            showMessage(`Загружено ${items.length} путей`, 'success');
        }

        // Отображение треков
        function renderTracks(tracks) {
            if (!tracks || tracks.length === 0) {
                return '<div class="no-records">Нет треков</div>';
            }

            let html = '<div class="records-list"><strong>Треки:</strong>';

            for (const track of tracks) {
                html += `<div class="record"><div class="record-value">${escapeHtml(track)}</div></div>`;
            }

            html += '</div>';
            return html;
        }

        // Форматирование размера в байтах
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Загрузка записей для пути
        async function loadRecordings(pathName, recordingsSection) {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const playbackUrl = document.getElementById('playbackUrl').value.trim();
            if (!recordingsSection) {
                console.warn('Recordings section not found for path:', pathName);
                return;
            }

            // Переключаем видимость
            if (recordingsSection.classList.contains('show')) {
                recordingsSection.classList.remove('show');
                return;
            }

            recordingsSection.innerHTML = '<div class="loading">Загрузка записей...</div>';
            recordingsSection.classList.add('show');

            try {
                // Список записей за последние 24 часа через playback API
                if (playbackUrl) {
                    const { startIso, endIso } = getLast24hRangeIso();
                    const listUrl = `${playbackUrl}/list?path=${encodeURIComponent(pathName)}&start=${encodeURIComponent(startIso)}&end=${encodeURIComponent(endIso)}`;
                    const response = await fetch(listUrl, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        displayRecordingsFromPlayback(data, recordingsSection, pathName, playbackUrl, startIso, endIso);
                        return;
                    }
                } else {
                    recordingsSection.innerHTML = '<div style="color: #c62828;">Введите URL Playback сервера (например: http://localhost:9996)</div>';
                    return;
                }

                // Если playback не сработал, пытаемся получить через API
                const response = await fetch(`${apiUrl}/v3/recordings/get/${encodeURIComponent(pathName)}`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                displayRecordings(data, recordingsSection, playbackUrl);
            } catch (error) {
                recordingsSection.innerHTML = `<div style="color: #c62828;">Ошибка: ${escapeHtml(error.message)}</div>`;
                console.error('Error:', error);
            }
        }

        // Отображение записей из playback API
        function displayRecordingsFromPlayback(data, container, pathName, playbackUrl, queryStartIso, queryEndIso) {
            const recordings = normalizePlaybackListResponse(data);
            if (!recordings || recordings.length === 0) {
                container.innerHTML = '<div style="color: #999; font-style: italic;">Нет записей</div>';
                return;
            }

            let html = `
                <div class="recordings-header">📹 Записи за последние 24 часа:</div>
                <div style="font-size: 0.8em; color: #777; margin-bottom: 6px; word-break: break-all;">
                    start=${escapeHtml(queryStartIso)}<br>
                    end=${escapeHtml(queryEndIso)}
                </div>
            `;

            for (const recording of recordings) {
                const start = recording.start || 'Неизвестная дата';
                const end = recording.end || '';
                const duration = Number.isFinite(recording.duration) ? recording.duration : 0;
                const durationStr = duration ? `(${Math.floor(duration)}с)` : '';
                const endStr = end ? ` → ${escapeHtml(end)}` : '';
                html += `
                    <div class="segment-item"
                         data-start="${escapeHtml(start)}"
                         data-end="${escapeHtml(end)}"
                         data-duration="${duration}"
                         style="cursor: pointer;">
                        ⏯️ ${escapeHtml(start)}${endStr} ${durationStr}
                    </div>
                `;
            }

            container.innerHTML = html;

            // По клику открываем запись в плеере
            const items = container.querySelectorAll('.segment-item');
            for (const el of items) {
                el.addEventListener('click', () => {
                    const start = el.getAttribute('data-start') || '';
                    const end = el.getAttribute('data-end') || '';
                    let duration = Number(el.getAttribute('data-duration') || 0);
                    if ((!Number.isFinite(duration) || duration <= 0) && start && end) {
                        const startDate = new Date(start);
                        const endDate = new Date(end);
                        if (!Number.isNaN(startDate.getTime()) && !Number.isNaN(endDate.getTime())) {
                            duration = Math.max(1, (endDate.getTime() - startDate.getTime()) / 1000);
                        }
                    }
                    if (!Number.isFinite(duration) || duration <= 0) duration = 3600;
                    playRecording(pathName, start, duration);
                });
            }
        }

        // Отображение записей из API
        function displayRecordings(data, container, playbackUrl) {
            if (!data.segments || data.segments.length === 0) {
                container.innerHTML = '<div style="color: #999; font-style: italic;">Нет записей</div>';
                return;
            }

            const cutoff = Date.now() - 24 * 60 * 60 * 1000;
            const segments = data.segments.filter(seg => {
                const start = seg && seg.start ? new Date(seg.start) : null;
                if (!start || Number.isNaN(start.getTime())) return false;
                return start.getTime() >= cutoff;
            });

            if (segments.length === 0) {
                container.innerHTML = '<div style="color: #999; font-style: italic;">Нет записей за последние 24 часа</div>';
                return;
            }

            let html = '<div class="recordings-header">📹 Записи за последние 24 часа:</div>';

            for (const segment of segments) {
                const segmentStart = segment.start || 'Неизвестная дата';
                const duration = segment.duration || 3600; // Используем 1 час по умолчанию
                const segmentEnd = computeEndIso(segmentStart, duration);
                html += `
                    <div class="segment-item"
                         data-path="${escapeHtml(data.name)}"
                         data-start="${escapeHtml(segmentStart)}"
                         data-end="${escapeHtml(segmentEnd)}"
                         data-duration="${duration}"
                         style="cursor: pointer;">
                        ⏯️ ${escapeHtml(segmentStart)}
                    </div>
                `;
            }

            container.innerHTML = html;

            // По клику открываем запись в плеере
            const items = container.querySelectorAll('.segment-item');
            for (const el of items) {
                el.addEventListener('click', () => {
                    const pathName = el.getAttribute('data-path') || '';
                    const start = el.getAttribute('data-start') || '';
                    const duration = Number(el.getAttribute('data-duration') || 0);
                    playRecording(pathName, start, duration);
                });
            }
        }

        function getLast24hRangeIso() {
            const end = new Date();
            const start = new Date(end.getTime() - 24 * 60 * 60 * 1000);
            return { startIso: start.toISOString(), endIso: end.toISOString() };
        }

        function normalizePlaybackListResponse(payload) {
            let items = [];
            if (Array.isArray(payload)) items = payload;
            else if (payload && Array.isArray(payload.items)) items = payload.items;
            else if (payload && Array.isArray(payload.segments)) items = payload.segments;
            else if (payload && Array.isArray(payload.recordings)) items = payload.recordings;

            const out = [];
            for (const item of items) {
                if (!item || typeof item !== 'object') continue;
                const start = item.start ?? item.begin ?? item.from ?? item.time ?? null;
                const end = item.end ?? item.to ?? null;
                const duration = typeof item.duration === 'number' ? item.duration : (typeof item.dur === 'number' ? item.dur : NaN);
                const computedEnd = end || computeEndIso(start, duration);
                out.push({
                    start: start || 'Неизвестная дата',
                    end: computedEnd || '',
                    duration: Number.isFinite(duration) ? duration : 0
                });
            }
            return out;
        }

        function computeEndIso(startIso, durationSeconds) {
            const duration = Number(durationSeconds);
            if (!startIso || !Number.isFinite(duration) || duration <= 0) return '';
            const start = new Date(startIso);
            if (Number.isNaN(start.getTime())) return '';
            return new Date(start.getTime() + duration * 1000).toISOString();
        }

        function openPlaybackRecordingListUrl(playbackUrl, pathName, start, end) {
            if (!playbackUrl) {
                alert('Пожалуйста, введите URL Playback сервера');
                return;
            }
            if (!start || !end) {
                alert('Не удалось определить start/end для записи');
                return;
            }
            const url = `${playbackUrl}/list?path=${encodeURIComponent(pathName)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
            window.open(url, '_blank', 'noopener');
        }

        function safeDecodeURIComponent(value) {
            try {
                return decodeURIComponent(value);
            } catch {
                return value;
            }
        }

        // Воспроизведение записи
	        function playRecording(pathName, segmentStart, duration) {
	            const playbackUrl = document.getElementById('playbackUrl').value.trim();
            
            if (!playbackUrl) {
                alert('Пожалуйста, введите URL Playback сервера');
                return;
            }
            
	            // URL для воспроизведения записи - используем format=mp4 для полной загрузки
	            // Берём чуть больше длительность для уверенности в полной записи
	            const safeDuration = Math.ceil(duration) + 10;
	            const recordingUrl = `${playbackUrl}/get?path=${encodeURIComponent(pathName)}&start=${encodeURIComponent(segmentStart)}&duration=${safeDuration}&format=mp4`;
            
            // Ищем или создаём плеер
            let playerContainer = document.getElementById('player-container');
            if (!playerContainer) {
                playerContainer = document.createElement('div');
                playerContainer.id = 'player-container';
                playerContainer.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: white;
                    border: 1px solid #ddd;
                    padding: 20px;
                    z-index: 1000;
                    box-shadow: 0 0 20px rgba(0,0,0,0.3);
                    min-width: 600px;
                    border-radius: 5px;
                    max-width: 90vw;
                    max-height: 90vh;
                    overflow-y: auto;
                `;
                document.body.appendChild(playerContainer);
	            }

	            // Без проверки Range (сразу открываем плеер)
	            displayPlayer(recordingUrl, pathName, segmentStart, safeDuration, playerContainer, null, null);
	        }

	        // Отображение плеера с диагностикой
	        function displayPlayer(recordingUrl, pathName, segmentStart, duration, playerContainer, supportsRange, contentLength) {
	            if (window.vjsPlayer) {
	                window.vjsPlayer.dispose();
	                window.vjsPlayer = null;
	            }

	            const sizeStr = contentLength ? ` (${formatBytes(parseInt(contentLength))})` : '';

	            playerContainer.innerHTML = `
	                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
	                    <div>
	                        <strong>${escapeHtml(pathName)}</strong><br>
	                        <small style="color: #666;">${escapeHtml(segmentStart)}</small><br>
	                        <small style="color: #999;">Длина: ${formatTime(duration)}${sizeStr}</small>
	                    </div>
	                    <button onclick="closePlayer()" style="background: #333; color: white; border: none; padding: 5px 10px; cursor: pointer; flex-shrink: 0;">✕</button>
	                </div>
	                <video id="player-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
	                <div style="font-size: 0.75em; color: #999; word-break: break-all;">
	                    <details>
	                        <summary>URL и диагностика</summary>
	                        <code style="display: block; margin-top: 5px; padding: 5px; background: #f0f0f0;">${recordingUrl}</code>
	                    </details>
	                </div>
	            `;

	            window.vjsPlayer = videojs('player-video', {
	                controls: true,
	                preload: 'auto',
	                fluid: true,
	            });
	            initChunkedVideoJs(window.vjsPlayer, recordingUrl, duration);

	            // Создаём оверлей
	            let overlay = document.getElementById('player-overlay');
	            if (!overlay) {
	                overlay = document.createElement('div');
                overlay.id = 'player-overlay';
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0, 0, 0, 0.7);
                    z-index: 999;
                `;
                overlay.onclick = closePlayer;
                document.body.appendChild(overlay);
            }
        }

        // Закрытие плеера
	        function closePlayer() {
	            const playerContainer = document.getElementById('player-container');
	            const overlay = document.getElementById('player-overlay');
	            if (window.vjsPlayer) {
	                window.vjsPlayer.dispose();
	                window.vjsPlayer = null;
	            }

	            if (playerContainer) playerContainer.remove();
	            if (overlay) overlay.remove();
	        }

	        // Форматирование времени
	        function formatTime(seconds) {
	            const h = Math.floor(seconds / 3600);
	            const m = Math.floor((seconds % 3600) / 60);
	            const s = Math.floor(seconds % 60);
            
            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
	            return `${m}:${String(s).padStart(2, '0')}`;
	        }

	        function parseRfc3339ToEpochNs(value) {
	            if (!value) return null;

	            const str = String(value).trim();
	            const m = str.match(/^(\d{4}-\d\d-\d\dT\d\d:\d\d:\d\d)(?:\.(\d+))?(Z|[+-]\d\d:\d\d)?$/);
	            if (!m) return null;

	            const base = m[1];
	            const fracRaw = m[2] || '';
	            const tz = m[3] || 'Z';

	            // Парсим без дробной части (точность до секунды), а дробь добавляем сами (BigInt наносекунды).
	            const baseDate = new Date(`${base}${tz}`);
	            if (Number.isNaN(baseDate.getTime())) return null;

	            const fracDigits = fracRaw.length;
	            const frac9 = fracRaw ? fracRaw.padEnd(9, '0').slice(0, 9) : '0'.padStart(9, '0');
	            const fracNs = BigInt(frac9);
	            const epochNs = BigInt(baseDate.getTime()) * 1000000n + fracNs;

	            return { epochNs, fracDigits };
	        }

	        function epochNsToRfc3339Utc(epochNs, fracDigits) {
	            const ns = BigInt(epochNs);
	            const ms = Number(ns / 1000000n);
	            const d = new Date(ms);

	            const yyyy = d.getUTCFullYear();
	            const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
	            const dd = String(d.getUTCDate()).padStart(2, '0');
	            const hh = String(d.getUTCHours()).padStart(2, '0');
	            const mi = String(d.getUTCMinutes()).padStart(2, '0');
	            const ss = String(d.getUTCSeconds()).padStart(2, '0');
	            const base = `${yyyy}-${mm}-${dd}T${hh}:${mi}:${ss}`;

	            const digits = Math.max(0, Math.min(9, Number(fracDigits) || 0));
	            if (digits === 0) return `${base}Z`;

	            const remNs = ns % 1000000000n;
	            const frac9 = remNs.toString().padStart(9, '0');
	            const frac = frac9.slice(0, digits);
	            return `${base}.${frac}Z`;
	        }

	        function buildPlaybackGetUrl(playbackUrl, pathParam, startIso, durationSeconds) {
	            return `${playbackUrl}/get?path=${encodeURIComponent(pathParam)}&start=${encodeURIComponent(startIso)}&duration=${Math.ceil(durationSeconds)}&format=mp4`;
	        }

	        function initChunkedVideoJs(player, recordingUrl, totalDuration) {
	            const playbackUrlRaw = document.getElementById('playbackUrl').value.trim();
	            const playbackUrl = playbackUrlRaw.replace(/\/+$/, '');
	            const urlParams = new URL(recordingUrl);
	            const pathParam = urlParams.searchParams.get('path') || '';
	            const startParam = urlParams.searchParams.get('start') || '';
	            const startParsed = parseRfc3339ToEpochNs(startParam);
	            const startEpochNs = startParsed ? startParsed.epochNs : null;
	            const startFracDigits = startParsed ? startParsed.fracDigits : 0;

	            const state = {
	                playbackUrl,
	                pathParam,
	                startParam,
	                startEpochNs,
	                startFracDigits,
	                totalDuration: Math.max(0, Number(totalDuration) || 0),
	                chunkSize: 120,
	                baseTime: 0,
	                chunkDuration: 0,
	                isLoading: false,
	                pendingSeek: null,
	                seekTimer: null,
	                virtualTime: null,
	            };

	            const origCurrentTime = player.currentTime.bind(player);
	            const origDuration = player.duration.bind(player);

	            const setVirtualDuration = () => {
	                try {
	                    origDuration(state.totalDuration);
	                    player.trigger('durationchange');
	                } catch {
	                    // ignore
	                }
	            };

	            const clampToTimeline = (value) => {
	                const t = Math.max(0, Number(value) || 0);
	                if (state.totalDuration <= 0) return 0;
	                return Math.min(state.totalDuration - 0.01, t);
	            };

	            const loadChunkAt = (absoluteSeconds, { autoplay = false, inChunkTime = 0 } = {}) => {
	                if (!state.playbackUrl || !state.startEpochNs) {
	                    player.src({ src: recordingUrl, type: 'video/mp4' });
	                    setVirtualDuration();
	                    return;
	                }

	                const abs = clampToTimeline(absoluteSeconds);
	                const baseTime = Math.floor(abs);
	                const startIso = baseTime === 0
	                    ? state.startParam
	                    : epochNsToRfc3339Utc(state.startEpochNs + BigInt(baseTime) * 1000000000n, state.startFracDigits);
	                const remaining = state.totalDuration - baseTime;
	                const chunkDuration = Math.min(state.chunkSize, Math.max(0, remaining));
	                if (chunkDuration <= 0) return;

	                state.isLoading = true;
	                state.virtualTime = abs;
	                state.baseTime = baseTime;
	                state.chunkDuration = chunkDuration;

	                const src = buildPlaybackGetUrl(state.playbackUrl, state.pathParam, startIso, chunkDuration);
	                player.src({ src, type: 'video/mp4' });

	                player.one('loadedmetadata', () => {
	                    setVirtualDuration();
	                    try {
	                        origCurrentTime(Math.min(Math.max(0, Number(inChunkTime) || 0), Math.max(0, chunkDuration - 0.01)));
	                    } catch {
	                        // ignore
	                    }

	                    state.isLoading = false;
	                    state.virtualTime = null;

	                    if (autoplay) {
	                        player.play().catch(() => {});
	                    }

	                    if (state.pendingSeek != null) {
	                        const pending = state.pendingSeek;
	                        state.pendingSeek = null;
	                        seekVirtual(pending);
	                    }
	                });
	            };

	            const scheduleSeek = (t) => {
	                state.pendingSeek = t;
	                state.virtualTime = t;
	                if (state.seekTimer) clearTimeout(state.seekTimer);
	                state.seekTimer = setTimeout(() => {
	                    const target = state.pendingSeek;
	                    state.pendingSeek = null;
	                    if (target == null) return;
	                    seekVirtual(target);
	                }, 200);
	            };

	            const seekVirtual = (t) => {
	                const target = clampToTimeline(t);
	                if (state.isLoading) {
	                    state.pendingSeek = target;
	                    state.virtualTime = target;
	                    return target;
	                }
	                const autoplay = !player.paused();
	                const baseTime = Math.floor(target);
	                const inChunk = target - baseTime;
	                loadChunkAt(target, { autoplay, inChunkTime: inChunk });
	                return target;
	            };

	            player.currentTime = function(t) {
	                if (t === undefined) {
	                    if (state.virtualTime != null) return state.virtualTime;
	                    return state.baseTime + origCurrentTime();
	                }
	                scheduleSeek(t);
	                return t;
	            };

	            player.duration = function(d) {
	                if (d === undefined) return state.totalDuration;
	                return origDuration(d);
	            };

	            player.on('timeupdate', () => {
	                if (state.isLoading) return;
	                const abs = player.currentTime();
	                const inChunk = abs - state.baseTime;
	                const threshold = Math.max(0, state.chunkDuration - 10);
	                if (state.chunkDuration > 0 && inChunk > threshold &&
	                    state.baseTime + state.chunkDuration < state.totalDuration) {
	                    const autoplay = !player.paused();
	                    loadChunkAt(state.baseTime + state.chunkDuration, { autoplay, inChunkTime: 0 });
	                }
	            });

	            player.on('ended', () => {
	                if (state.isLoading) return;
	                if (state.baseTime + state.chunkDuration < state.totalDuration) {
	                    loadChunkAt(state.baseTime + state.chunkDuration, { autoplay: true, inChunkTime: 0 });
	                }
	            });

	            player.one('dispose', () => {
	                if (state.seekTimer) clearTimeout(state.seekTimer);
	            });

	            // Старт: первый чанк
	            loadChunkAt(0, { autoplay: false, inChunkTime: 0 });
	        }

	        // Показать сообщение
	        function showMessage(text, type) {
	            const messageDiv = document.getElementById('message');
	            const className = type === 'error' ? 'error' : 'success';
	            messageDiv.innerHTML = `<div class="${className}">${escapeHtml(text)}</div>`;
	        }

        // Экранирование HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // Обработка Enter в input
        document.getElementById('apiUrl').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                loadPaths();
            }
        });

        document.getElementById('playbackUrl').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                loadPaths();
            }
        });

        // Загружаем пути при загрузке страницы
        window.addEventListener('load', function() {
            // Можно автоматически загрузить при открытии
            // loadPaths();
        });
    </script>
</body>
